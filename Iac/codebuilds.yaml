AWSTemplateFormatVersion: "2010-09-09"
Description: CodeBuild Projects for App Packaging and Test Automation

Parameters:
  ArtifactBucket:
    Type: String

  TestRepoUrl:
    Type: String
    Default: https://github.com/DipanjanRay/codepipeline-test-automation.git

  TestBranchName:
    Type: String
    Default: main

Resources:
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: codebuild-demo-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  ############################################
  # CI Packaging Build (App Repo)
  ############################################

  PackageBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: app-package-build
      ServiceRole: !GetAtt CodeBuildRole.Arn

      Artifacts:
        Type: NO_ARTIFACTS

      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER

      Source:
        Type: GITHUB
        Location: https://github.com/DipanjanRay/codepipeline-test-demo.git
        BuildSpec: buildspec-package.yml

  ############################################
  # Test Automation Build (Test Repo)
  ############################################

  TestAutomationBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: app-test-build
      ServiceRole: !GetAtt CodeBuildRole.Arn

      Artifacts:
        Type: NO_ARTIFACTS

      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: Environment
            Value: dev
          - Name: TestSuite
            Value: smoke

      Source:
        Type: GITHUB
        Location: !Ref TestRepoUrl
        GitCloneDepth: 1
        ReportBuildStatus: true

      SourceVersion: !Ref TestBranchName
