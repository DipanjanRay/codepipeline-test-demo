AWSTemplateFormatVersion: "2010-09-09"
Description: CI/CD Pipeline (S3 App + GitHub Test Repo)

Parameters:
  ArtifactBucket:
    Type: String

  GitHubConnectionArn:
    Type: String
    Description: AWS CodeConnections ARN for GitHub

  TestBranchName:
    Type: String
    Default: main
    Description: Branch name of test repository

Resources:
  #################################################
  # IAM Role for CodePipeline
  #################################################

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pipeline-demo-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                  - codebuild:*
                  - codestar-connections:UseConnection
                Resource: "*"

  #################################################
  # CodePipeline
  #################################################

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: demo-pipeline
      RoleArn: !GetAtt PipelineRole.Arn

      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket

      Stages:
        #################################################
        # 1️⃣ Source Stage
        #################################################

        - Name: Source
          Actions:
            # S3 Source (App Artifact)
            - Name: S3Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: 1
              OutputArtifacts:
                - Name: AppArtifact
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: app.zip
                PollForSourceChanges: true
              RunOrder: 1

            # GitHub Source (Test Repo)
            - Name: TestRepoSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              OutputArtifacts:
                - Name: TestArtifact
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: DipanjanRay/codepipeline-test-automation
                BranchName: !Ref TestBranchName
                DetectChanges: true
              RunOrder: 1

        #################################################
        # 2️⃣ Deploy Stage (Uses AppArtifact only)
        #################################################

        - Name: Deploy
          Actions:
            - Name: DummyDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: app-deploy-build
              InputArtifacts:
                - Name: AppArtifact
              RunOrder: 1

        #################################################
        # 3️⃣ Test Stage (Uses TestArtifact only)
        #################################################

        - Name: Test
          Actions:
            - Name: RunTests
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: app-test-build
                EnvironmentVariables: |
                  [
                    {"name":"Environment","value":"dev","type":"PLAINTEXT"},
                    {"name":"TestSuite","value":"smoke","type":"PLAINTEXT"}
                  ]
              InputArtifacts:
                - Name: TestArtifact
              RunOrder: 1
